name: Palantir CI
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/8 * * * *'
jobs:
  palantir:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python3 skills/dark-osint-palantir/scripts/ingest_cycle.py || true
