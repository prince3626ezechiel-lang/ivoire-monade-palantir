<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9963A"/>
      <stop offset="50%" stop-color="#F1C40F"/>
      <stop offset="100%" stop-color="#A17846"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#0F3D1F"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="180" fill="#166534" stroke="url(#goldGrad)" stroke-width="2"/>

  <!-- Sunburst / Crown behind face -->
  <g stroke="url(#goldGrad)" stroke-width="1.5" fill="none" opacity="0.6">
    <line x1="200" y1="40" x2="200" y2="80"/>
    <line x1="260" y1="50" x2="245" y2="85"/>
    <line x1="310" y1="90" x2="285" y2="115"/>
    <line x1="345" y1="150" x2="315" y2="165"/>
    <line x1="355" y1="200" x2="320" y2="200"/>
    <line x1="140" y1="50" x2="155" y2="85"/>
    <line x1="90" y1="90" x2="115" y2="115"/>
    <line x1="55" y1="150" x2="85" y2="165"/>
    <line x1="45" y1="200" x2="80" y2="200"/>
  </g>

  <!-- Left crocodile head -->
  <g fill="none" stroke="#1E293B" stroke-width="2.5" stroke-linejoin="round">
    <path d="M 75 175 L 115 170 L 140 175 L 150 180 L 140 185 L 115 190 L 75 185 Z"/>
    <circle cx="95" cy="178" r="2" fill="#1E293B"/>
    <path d="M 130 173 L 140 175 L 130 177" fill="none" stroke="#1E293B" stroke-width="1.5"/>
    <path d="M 70 175 L 58 170 M 70 177 L 58 177 M 70 179 L 58 182" stroke="#1E293B" stroke-width="1"/>
  </g>

  <!-- Right crocodile head -->
  <g fill="none" stroke="#1E293B" stroke-width="2.5" stroke-linejoin="round">
    <path d="M 325 175 L 285 170 L 260 175 L 250 180 L 260 185 L 285 190 L 325 185 Z"/>
    <circle cx="305" cy="178" r="2" fill="#1E293B"/>
    <path d="M 270 173 L 260 175 L 270 177" fill="none" stroke="#1E293B" stroke-width="1.5"/>
    <path d="M 330 175 L 342 170 M 330 177 L 342 177 M 330 179 L 342 182" stroke="#1E293B" stroke-width="1"/>
  </g>

  <!-- Central face mask -->
  <g>
    <!-- Face base -->
    <ellipse cx="200" cy="210" rx="55" ry="68" fill="url(#goldGrad)"/>
    <!-- Forehead circle with e -->
    <circle cx="200" cy="165" r="16" fill="#166534" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <text x="200" y="170" font-family="Georgia, serif" font-size="16" fill="#F1C40F" text-anchor="middle" font-weight="bold">e</text>
    <!-- Eyes -->
    <path d="M 178 200 Q 185 193 192 200" fill="none" stroke="#1E293B" stroke-width="2"/>
    <path d="M 208 200 Q 215 193 222 200" fill="none" stroke="#1E293B" stroke-width="2"/>
    <!-- Nose -->
    <path d="M 200 200 L 196 214 Q 200 218 204 214 Z" fill="#1E293B"/>
    <!-- Lips -->
    <path d="M 186 226 Q 200 233 214 226" fill="none" stroke="#1E293B" stroke-width="2"/>
    <path d="M 186 226 Q 200 222 214 226" fill="none" stroke="#1E293B" stroke-width="1.5"/>
    <!-- Cheek lines -->
    <path d="M 170 218 L 180 220" stroke="#1E293B" stroke-width="1.2" opacity="0.5"/>
    <path d="M 230 218 L 220 220" stroke="#1E293B" stroke-width="1.2" opacity="0.5"/>
  </g>

  <!-- Outer ring text placeholder -->
  <path id="topArc" d="M 60,200 A 140,140 0 0,1 340,200" fill="none"/>
  <path id="bottomArc" d="M 340,200 A 140,140 0 0,1 60,200" fill="none"/>
  <text font-family="Georgia, serif" font-size="11" fill="#F1C40F" letter-spacing="4" font-weight="bold">
    <textPath href="#topArc" startOffset="22%">EON IVOIRE</textPath>
  </text>
  <text font-family="Arial, sans-serif" font-size="8" fill="#F1C40F" letter-spacing="3" opacity="0.85">
    <textPath href="#bottomArc" startOffset="28%">RENEWABLE ENERGY &amp; E-BUSINESS | AFRICA</textPath>
  </text>
</svg>
