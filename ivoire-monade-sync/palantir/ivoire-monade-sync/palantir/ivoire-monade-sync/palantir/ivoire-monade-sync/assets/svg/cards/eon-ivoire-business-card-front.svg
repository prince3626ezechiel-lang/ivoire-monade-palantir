<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 400" width="160" height="400">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C9963A"/>
      <stop offset="50%" stop-color="#F1C40F"/>
      <stop offset="100%" stop-color="#A17846"/>
    </linearGradient>
  </defs>
  <!-- Dark green background card -->
  <rect x="0" y="0" width="160" height="400" rx="8" fill="#166534"/>
  <!-- Simplified emblem -->
  <g transform="translate(80,100)">
    <circle r="55" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <ellipse cx="0" cy="5" rx="25" ry="32" fill="url(#goldGrad)"/>
    <circle cx="0" cy="-22" r="8" fill="#166534" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <text x="0" y="-19" font-family="Georgia, serif" font-size="12" fill="#F1C40F" text-anchor="middle" font-weight="bold">e</text>
    <path d="M -14 0 Q -8 -6 -2 0" fill="none" stroke="#1E293B" stroke-width="1.2"/>
    <path d="M 2 0 Q 8 -6 14 0" fill="none" stroke="#1E293B" stroke-width="1.2"/>
    <path d="M 0 0 L -2 10 Q 0 13 2 10 Z" fill="#1E293B"/>
    <path d="M -10 16 Q 0 21 10 16" fill="none" stroke="#1E293B" stroke-width="1"/>
  </g>
  <!-- Brand text -->
  <text x="80" y="170" font-family="Georgia, serif" font-size="16" fill="#F1C40F" text-anchor="middle" font-weight="bold" letter-spacing="1">EON IVOIRE</text>
  <text x="80" y="186" font-family="Arial, sans-serif" font-size="7" fill="#F1C40F" text-anchor="middle" letter-spacing="1.5">RENEWABLE ENERGY &amp; E-BUSINESS</text>
  <text x="80" y="196" font-family="Arial, sans-serif" font-size="7" fill="#F1C40F" text-anchor="middle" letter-spacing="1.5">AFRICA</text>

  <!-- Bottom geometric band -->
  <rect x="0" y="350" width="160"="50" fill="#1E293B"/>
  <pattern id="geoBand" x="0" y="350" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M0,10 L10,0 L20,10 L10,20 Z" fill="none" stroke="#F1C40F" stroke-width="1"/>
  </pattern>
  <rect x="0" y="350" width="160" height="50" fill="url(#geoBand)"/>

  <!-- Contact block -->
  <text x="80" y="240" font-family="Arial, sans-serif" font-size="7.5" fill="#F1C40F" text-anchor="middle">DIRECTEUR MARKETING</text>
  <text x="80" y="252" font-family="Arial, sans-serif" font-size="7.5" fill="#F1C40F" text-anchor="middle">+225 07 77 18 78</text>
  <!-- QR placeholder -->
  <rect x="115" y="340" width="30" height="30" fill="#F1C40F" opacity="0.2"/>
</svg>
