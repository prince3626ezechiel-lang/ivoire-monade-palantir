<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9963A"/>
      <stop offset="50%" stop-color="#F1C40F"/>
      <stop offset="100%" stop-color="#A17846"/>
    </linearGradient>
    <pattern id="bgPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M0,20 L20,0 L40,20 L20,40 Z" fill="none" stroke="#F1C40F" stroke-width="0.5" opacity="0.25"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="800" height="200" fill="#FFFFFF"/>
  <rect width="800" height="200" fill="url(#bgPattern)"/>
  <!-- Colored accent bar -->
  <rect x="0" y="0" width="6" height="200" fill="#166534"/>
  <rect x="6" y="0" width="6" height="200" fill="#1E293B"/>
  <rect x="12" y="0" width="6" height="200" fill="#A17846"/>
  <rect x="18" y="0" width="6" height="200" fill="#F1C40F"/>

  <!-- Small emblem left -->
  <g transform="translate(80,100)">
    <circle r="28" fill="none" stroke="#166534" stroke-width="1.2"/>
    <ellipse cx="0" cy="2" rx="12" ry="15" fill="#166534"/>
    <circle cx="0" cy="-12" r="4.5" fill="#FFFFFF" stroke="#166534" stroke-width="1"/>
    <text x="0" y="-10" font-family="Georgia, serif" font-size="9" fill="#F1C40F" text-anchor="middle" font-weight="bold">e</text>
