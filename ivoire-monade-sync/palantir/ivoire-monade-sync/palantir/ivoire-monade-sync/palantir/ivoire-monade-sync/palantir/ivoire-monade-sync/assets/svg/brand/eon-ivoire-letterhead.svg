  <text x="175" y="112" font-family="Arial, sans-serif" font-size="11" fill="#1E293B">21/6/2021</text>

  <!-- Table header -->
  <rect x="140" y="130" width="620" height="28" fill="#1E293B"/>
  <text x="150" y="148" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">#</text>
  <text x="180" y="148" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">DESCRIPTION</text>
  <text x="620" y="148" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">QTY</text>
  <text x="680" y="148" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" font-weight="bold">PRICE</text>

