  <text x="150" y="177" font-family="Arial, sans-serif" font-size="11" fill="#1E293B">1</text>
  <text x="180" y="177" font-family="Arial, sans-serif" font-size="11" fill="#1E293B">Client name dolor exsulatur netor</text>
  <text x="640" y="177" font-family="Arial, sans-serif" font-size="11" fill="#1E293B">2</text>
  <text x="700" y="177" font-family="Arial, sans-serif" font-size="11" fill="#1E293B">#150.00</text>

  <rect x="140" y="188" width="620" height="30" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="150" y="207" font-family="Arial, sans-serif" font-size="11" fill="#1E293B">2</text>
  <text x="180" y="207" font-family="Arial, sans-serif" font-size="11" fill="#1E293B">Client name dolor exsulla netor</text>
  <text x="640" y="207" font-family="Arial, sans-serif" font-size="11" fill="#1E293B">3</text>
  <text x="700" y="207" font-family="Arial, sans-serif" font-size="11" fill="#1E293B">#135.00</text>
