id: ooda-loop
name: OODA Dev loop
version: 0.1.0
description: >
  OODA learning-and-apprenticeship loop for the Agentic OS.
  Bonds cronjobs, memory-bus, and coworker channels.
observe:
  cronjobs: true
  memory_bus: true
  coworker_sync: true
orient:
  winning_signals:
    - telegram_delivery_success
    - quote_conversion
    - cron_evidence_ok
    - repo_push_ok
  losing_signals:
    - gateway_5xx
    - yt_requestblocked_without_cookies
    - youtube_blocked
    - blocked_extraction
    - blocked_by_bot_check
decide:
  rule: if win_rate_recent > 0.6 then accelerate else throttle
  cadence_s: 8
act:
  emit_evidence: true
  emit_telegram: true
  emit_ticket: true
  persist_state: /root/.hermes/ooda/state/ooda_state.json
coworkers:
  abischaii_dark_ops:
    log_dir: /root/.hermes/abischaii-dark-ops/logs
    role: security/escalation
  obm_orchestrator:
    log_dir: /opt/ivoire-monade/agents/maxwell/dreams
    fallback_log_dir: /root/.hermes/abischaii-dark-ops/logs/dreams
    role: strategy/shipping
  trading_researcher:
    log_dir: /opt/ivoire-monade/agents/maxwell/dreams
    fallback_log_dir: /root/.hermes/abischaii-dark-ops/logs/dreams
    role: market/tools
