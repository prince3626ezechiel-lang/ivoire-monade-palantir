<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{TITLE}} - 一页纸总结</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #fff5f5 0%, #fff0f0 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { 
      max-width: 1100px; 
      margin: 0 auto;
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 80px rgba(220, 38, 38, 0.12);
    }
    #header {
      background: linear-gradient(135deg, #DC2626 0%, #DB2777 100%);
      padding: 50px 40px;
      color: white;
    }
    #header h1 { 
      font-size: 48px; 
      margin-bottom: 15px; 
      letter-spacing: -1px;
      line-height: 1.2;
    }
    #header .subtitle {
      font-size: 22px;
      opacity: 0.95;
      font-weight: 300;
    }
    #header .source {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.8;
    }
    #content { padding: 35px 40px; }
    .section { margin-bottom: 35px; }
    .section-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 3px solid;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-number {
      background: rgba(255,255,255,0.2);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
    }
    /* 核心洞察 - 橙红色 */
    .insights .section-title { border-color: #EA580C; color: #EA580C; }
    .insights .section-number { background: #EA580C; color: white; }
    /* 趋势 - 蓝色 */
    .trends .section-title { border-color: #2563EB; color: #2563EB; }
    .trends .section-number { background: #2563EB; color: white; }
    /* 数据 - 绿色 */
    .data .section-title { border-color: #16A34A; color: #16A34A; }
    .data .section-number { background: #16A34A; color: white; }
    /* 玩家 - 紫色 */
    .players .section-title { border-color: #9333EA; color: #9333EA; }
    .players .section-number { background: #9333EA; color: white; }
    /* 案例 - 粉色 */
    .case .section-title { border-color: #DB2777; color: #DB2777; }
    .case .section-number { background: #DB2777; color: white; }
    /* 风险 - 红色 */
    .risk .section-title { border-color: #DC2626; color: #DC2626; }
    .risk .section-number { background: #DC2626; color: white; }
    
    .insight-item, .trend-item, .data-item, .player-item {
      background: #FEFEFE;
      padding: 18px 24px;
      border-radius: 12px;
      margin-bottom: 14px;
      color: #374151;
      font-size: 17px;
      line-height: 1.7;
      border: 1px solid #FEE2E2;
    }
    .insight-item { 
      border-left: 5px solid #EA580C; 
      font-size: 18px;
    }
    .insight-item strong {
      color: #1F2937;
      display: block;
      margin-bottom: 6px;
    }
    .trend-item { border-left: 5px solid #2563EB; }
    .trend-item .trend-num {
      font-weight: bold;
      color: #2563EB;
      margin-right: 8px;
    }
    .data-item { 
      border-left: 5px solid #16A34A; 
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }
    .data-value {
      font-size: 48px;
      font-weight: 800;
      color: #16A34A;
      letter-spacing: -2px;
      white-space: nowrap;
    }
    .data-content {
      flex: 1;
    }
    .data-label {
      font-size: 20px;
      font-weight: 600;
      color: #1F2937;
      margin-bottom: 4px;
    }
    .data-detail {
      color: #6B7280;
      font-size: 15px;
    }
    
    .player-item { 
      border-left: 5px solid #9333EA; 
      display: inline-block; 
      margin-right: 12px; 
      margin-bottom: 12px;
      padding: 12px 20px;
      font-size: 16px;
    }
    .player-item strong {
      color: #9333EA;
    }
    
    /* 图片区域 */
    .image-section {
      margin: 25px 0;
      text-align: center;
    }
    .image-section img {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .image-caption {
      font-size: 14px;
      color: #6B7280;
      margin-top: 8px;
    }
    
    /* 视频区域 */
    .video-section {
      margin: 25px 0;
      text-align: center;
    }
    .video-section iframe,
    .video-section video {
      max-width: 100%;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      border: none;
    }
    .video-caption {
      font-size: 14px;
      color: #6B7280;
      margin-top: 8px;
    }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }

    .case-box {
      background: rgba(219, 39, 119, 0.06);
      border: 1px solid rgba(219, 39, 119, 0.15);
      padding: 16px 20px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .case-name {
      font-weight: bold;
      color: #DB2777;
      margin-bottom: 5px;
    }
    .case-desc { color: #6B7280; font-size: 15px; }
    .case-result {
      color: #16A34A;
      font-size: 14px;
      margin-top: 8px;
      font-weight: 500;
    }
    
    .risk-box {
      background: rgba(220, 38, 38, 0.06);
      border: 1px solid rgba(220, 38, 38, 0.15);
      padding: 20px 25px;
      border-radius: 12px;
      color: #374151;
    }
    .risk-box p { margin-bottom: 10px; font-size: 16px; }
    .risk-box strong { color: #DC2626; }
    .suggestion-box {
      background: rgba(22, 163, 74, 0.06);
      border: 1px solid rgba(22, 163, 74, 0.15);
      padding: 16px 20px;
      border-radius: 10px;
      margin-top: 12px;
    }
    .suggestion-box strong { color: #16A34A; }
    
    #footer {
      background: linear-gradient(135deg, #DC2626 0%, #DB2777 100%);
      padding: 25px 40px;
      color: white;
    }
    .footer-link {
      font-size: 14px;
      margin-bottom: 10px;
      opacity: 0.9;
    }
    .footer-link a {
      color: #FEF08A;
      text-decoration: none;
    }
    .footer-link a:hover {
      text-decoration: underline;
    }
    .footer-credit {
      font-size: 16px;
      font-weight: 500;
    }

    .summary-box {
      background: linear-gradient(135deg, #DC2626 0%, #DB2777 100%);
      padding: 25px 30px;
      border-radius: 16px;
      color: white;
      text-align: center;
    }
    .summary-box p {
      font-size: 22px;
      font-weight: 500;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="header">
      <h1>{{TITLE}}</h1>
      <p class="subtitle">{{SUBTITLE}}</p>
      <p class="source">{{SOURCE}}</p>
    </div>
    
    <div id="content">
      <!-- 核心观点 -->
      <div class="section insights">
        <div class="section-title">
          <span class="section-number">01</span>
          KEY INSIGHTS 核心洞察
        </div>
        {{INSIGHTS}}
      </div>
      
      <!-- 行业趋势 -->
      <div class="section trends">
        <div class="section-title">
          <span class="section-number">02</span>
          TRENDS 行业趋势
        </div>
        {{TRENDS}}
      </div>
      
      <!-- 数据亮点 - 大数字 -->
      <div class="section data">
        <div class="section-title">
          <span class="section-number">03</span>
          DATA 数据亮点
        </div>
        {{DATA}}
      </div>
      
      <!-- 视频嵌入（可选：本地视频 / B站 / YouTube） -->
      {{VIDEOS}}

      <!-- 关键玩家 -->
      <div class="section players">
        <div class="section-title">
          <span class="section-number">04</span>
          PLAYERS 关键玩家
        </div>
        {{PLAYERS}}
      </div>
      
      <!-- 图片（如有） -->
      {{IMAGES}}
      
      <!-- 案例启示 -->
      {{CASES}}
      
      <!-- 风险与建议 -->
      {{RISKS}}
      
      <!-- 总结 -->
      {{SUMMARY}}
    </div>

    <!-- 页脚：原文链接 + stats + 署名 -->
    <div id="footer">
      <div class="footer-link">
        📄 原文链接：<a href="{{FOOTER_URL}}" target="_blank" rel="noopener">{{FOOTER_URL_DISPLAY}}</a>
      </div>
      <div class="footer-stats">
        📊 {{FOOTER_STATS}}
      </div>
      <div class="footer-credit">
        由 Angel's Hermes 制作
      </div>
    </div>
  </div>
</body>
</html>
<!-- 打印分页控制 -->
<style>
@media print {
  body { padding: 0; }
  .container { box-shadow: none; border-radius: 0; }
  .section { page-break-inside: avoid; }
  #footer { page-break-before: avoid; }
}
</style>

<style>
@media print {
  @page { size: A4; margin: 5mm; }
  body { padding: 0; zoom: 50%; }
  .container { box-shadow: none; border-radius: 0; max-width: 100%; }
  #content { padding: 10px; }
  .section { page-break-inside: avoid; margin-bottom: 8px; }
  .section-title { font-size: 14px; padding-bottom: 6px; }
  .insight-item, .trend-item, .data-item, .player-item { padding: 6px 10px; margin-bottom: 4px; font-size: 11px; }
  .data-value { font-size: 24px; }
  h1 { font-size: 24px; }
  .subtitle { font-size: 14px; }
  #header { padding: 20px; }
  #footer { padding: 15px; font-size: 10px; }
}
</style>
